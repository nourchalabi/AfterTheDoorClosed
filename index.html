<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>After the Door Closed</title>
  <link rel="stylesheet" href="style.css" />
</head>

<body>

  <div class="container">
    <h1>After the Door Closed</h1>
    <p class="subtitle">The world didn’t change. I did.</p>

    <!-- input -->
    <input
      type="text"
      id="textInput"
      placeholder="Write a simple moment (e.g. I sit with a cup of coffee)"
    />

    <!-- button -->
    <button id="generateBtn">See the world</button>

    <hr />

    <!-- output -->
    <div class="result">
      <h2>The same moment, seen twice</h2>

      <!-- comparison output -->
      <div id="sceneText"></div>
    </div>
  </div>

  <script src="script.js"></script>
</body>
</html>
